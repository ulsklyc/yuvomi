name: Update GitHub star count

# Refreshes the build-time star count embedded in docs/index.html so the
# landing page never has to call api.github.com from a visitor's browser
# (privacy: no third-country transfer of visitor IPs). See
# scripts/update-gh-stars.mjs and docs/datenschutz.html.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/update-gh-stars.mjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain docs/index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/index.html
            git commit -m "chore: refresh GitHub star count"
            git push
          fi
